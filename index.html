<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.lordicon.com/libs/mssddfmo/lord-icon-2.1.0.js"></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/style.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Sharp" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons+Two+Tone" rel="stylesheet">
    <title>ThinhBucks</title>
</head>
<style>
    body{
        font-family: monospace;
    }
    .header{
        height:10rem;
        width: 100%;
    }
    .textHead{
        font-family: monospace;
        font-size: 1.8rem;
        margin-left: 1rem;
    }
    .subhead{
        display: flex;
        justify-content: space-between;
        padding: 1rem;
    }
    .setting{cursor: pointer;}
    .element{
        height: 15rem;
        margin-bottom: 0.5rem;
        box-shadow: 1px 1px 3px 1px rgba(0, 0, 0, 1);
        display: flex;
        justify-content: space-between;
    }
    #first{
        flex-direction: column;
        justify-content: space-between;
        padding: 1.5rem;
        background-image: url("https://aeonmall-hadong.com.vn/wp-content/uploads/2019/08/Starbucks_-Product-Images_-1000x625-750x468.jpg");
        background-repeat: no-repeat;
        background-position: center left;
    }
    .first-pic{
        height: 15rem;
        width: 65%;
    }
    .btn-green{
        border: none;
        height: 2rem;
        width: 8rem;
        border-radius: 3rem;
        background-color: rgb(32, 151, 52);
        color: white;
        font-family:Arial, Helvetica, sans-serif;
        cursor: pointer;
        box-shadow: 1px 1px 3px 1px rgba(0, 0, 0, 1);
        transition: all 1s;
    }
    .btn-green:hover{
        background-color:rgb(66, 231, 176);
    }
    .content-pic{
        box-shadow: 1px 1px 3px 1px rgba(0, 0, 0, 1);
        height: 15rem;
        width: 40%;
    }
    .sub{
        font-size: 1.5rem;
        width: 50%;
        margin-left: 1rem;
        display: flex;
        flex-direction: column;
        justify-content:space-around;
        align-items:flex-start;
    }
    .footer{
        height: 5rem;
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        box-shadow: 1px 1px 3px 1px rgba(0, 0, 0, 1);
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: white;
    }
    .subfoot{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        width: 50%;
        transition: all 1s;
    }
    .subfoot:hover{
        background-color: aquamarine;
    }
    .sec-quote{
        font-size: 1.5rem;
    }
    .spc{
        color:rgb(156, 156, 156);
        font-size: 0.8rem;
    }
</style>
<body>
    <div class="header">
        <h1 class="textHead">It's a great day <br>for coffee
        <span class="material-icons-outlined">coffee</span></h1>
        <div class="subhead">
            <div class="userinfo">
                <span class="material-icons-outlined">account_box</span>
                <span style="font-size: 1rem">Sign in</span>
                <span class="material-icons-outlined">email</span>
                <span style="font-size: 1rem">Inbox</span>
            </div>
            <span style="cursor: pointer" class="material-icons-outlined">settings</span>
        </div>
    </div>
    <div class="content">
        <div class="element" id="first">
            <div>
                <div class="spc">BENEFITS</div>
                <div class="sec-quote" style="color:white">Earning rewards with</div>
            </div>
            <button class="btn-green" id="first-btn">Learn More</button>
        </div>
        <div class="element">
            <div class="sub">
                <div>
                    <div class="spc">NEW FEATURE MO&P</div>
                    <div class="sec-quote">Save time, <br> skip the line</div>
                </div>
                <button class="btn-green">Order Now</button>
            </div>
            <img class="content-pic" src="https://images.pexels.com/photos/1966449/pexels-photo-1966449.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940">
        </div>
        <div class="element">
            <div class="sub">
                <div>
                    <div class="spc">NEW FEATURE EGIFT</div>
                    <div class="quote">Gifting is so<br>so easy !</div>
                </div>
                <button class="btn-green">Send Now</button>
            </div>
            <img class="content-pic" src="https://images.pexels.com/photos/4927150/pexels-photo-4927150.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940">
        </div>
        <div class="element">
            <div class="sub">
                <div>
                    <div class="spc">NEW FEATURE EVENT</div>
                    <div class="quote">Make friends<br>more effectively</div>
                </div>
                <button class="btn-green">Join Now</button>
            </div>
            <img class="content-pic" src="https://images.pexels.com/photos/4349751/pexels-photo-4349751.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940">
        </div>
    </div>
    <div style="margin-bottom: 5.5rem"></div>
    <div class="footer">
        <div class="subfoot">
            <lord-icon
            src="https://cdn.lordicon.com/gmzxduhd.json"
            trigger="loop"
            delay="3000"
            colors="primary:#121331,secondary:#08a88a"
            style="width:50px;height:50px">
            </lord-icon>
            <div>Home</div>
        </div>
        <div class="subfoot">
            <lord-icon
            src="https://cdn.lordicon.com/qhviklyi.json"
            trigger="loop"
            delay="3000"
            colors="primary:#121331,secondary:#08a88a"
            style="width:50px;height:50px">
            </lord-icon>
            <div>Pay</div>
        </div>
        <div class="subfoot">
            <lord-icon
            src="https://cdn.lordicon.com/uxtcmjmu.json"
            trigger="loop"
            delay="3000"
            colors="primary:#121331,secondary:#08a88a"
            style="width:50px;height:50px">
            </lord-icon>
            <div>Order</div>
        </div>
        <div class="subfoot">
            <lord-icon
            src="https://cdn.lordicon.com/nkmsrxys.json"
            trigger="loop"
            delay="3000"
            colors="primary:#121331,secondary:#08a88a"
            style="width:50px;height:50px">
            </lord-icon>
            <div>Gift</div>
        </div>
        <div class="subfoot">
            <lord-icon
            src="https://cdn.lordicon.com/zzcjjxew.json"
            trigger="loop"
            delay="3000"
            colors="primary:#121331,secondary:#08a88a"
            style="width:50px;height:50px">
            </lord-icon>
            <div>Stores</div>
        </div>
    </div>
</body>
</html>
